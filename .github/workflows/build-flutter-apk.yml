name: Build Flutter APK

on:
  push:
    branches: [main]
    paths:
      - 'flutter_app/**'
      - '.github/workflows/build-flutter-apk.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Create Android platform files
        # flutter create on an existing directory generates the android/ folder
        # (including the gradle wrapper binary) without overwriting our lib/ files.
        # We save and restore our pubspec.yaml so flutter create cannot alter it.
        run: |
          cp flutter_app/pubspec.yaml /tmp/pubspec.yaml.bak
          flutter create \
            --org com.mytimetracker \
            --project-name mytimetracker \
            --platforms android \
            flutter_app
          cp /tmp/pubspec.yaml.bak flutter_app/pubspec.yaml

      - name: Install dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Build release APK
        working-directory: flutter_app
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mytimetracker-release-apk
          path: flutter_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
